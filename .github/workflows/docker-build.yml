name: Docker Build and Push

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
        description: "Full image name, for example ghcr.io/dephekt/keycloak-image"
      upstream_image_search:
        required: true
        type: string
        description: "String to grep for in Dockerfile to find upstream version"
      upstream_name_short:
        required: true
        type: string
        description: "Short name for tag suffix"
      dockerfile_path:
        required: false
        type: string
        default: "Dockerfile"
      context:
        required: false
        type: string
        default: "."
      fetch_submodules:
        required: false
        type: string
        default: "false"
      build_args:
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.fetch_submodules }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract upstream version
        id: upstream
        run: |
          set -euo pipefail
          upstream_image="${{ inputs.upstream_image_search }}"
          upstream_name="${{ inputs.upstream_name_short }}"
          dockerfile="${{ inputs.dockerfile_path }}"
          line="$(grep "FROM ${upstream_image}" "$dockerfile" | head -n 1)"

          if [ -z "$line" ]; then
            echo "::error::Could not find upstream image '${upstream_image}' in ${dockerfile}"
            exit 1
          fi

          full_image="$(echo "$line" | awk '{print $2}')"
          version="$(echo "$full_image" | awk -F: '{print $NF}')"

          echo "UPSTREAM_NAME=$upstream_name" >> "$GITHUB_OUTPUT"
          echo "UPSTREAM_VERSION=$version" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image_name }}
          tags: |
            type=semver,pattern={{version}},suffix=-${{ steps.upstream.outputs.UPSTREAM_NAME }}${{ steps.upstream.outputs.UPSTREAM_VERSION }}
            type=edge,suffix=-${{ steps.upstream.outputs.UPSTREAM_NAME }}${{ steps.upstream.outputs.UPSTREAM_VERSION }}
            type=ref,event=branch,enable=${{ github.ref_name != 'main' }},suffix=-${{ steps.upstream.outputs.UPSTREAM_NAME }}${{ steps.upstream.outputs.UPSTREAM_VERSION }}
            type=sha
            type=ref,event=pr

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile_path }}
          build-args: ${{ inputs.build_args }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

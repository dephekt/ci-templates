name: Docker Build and Push

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
        description: "Full image name (e.g. codeberg.org/org/image)"
      upstream_image_search:
        required: true
        type: string
        description: "String to grep for in Dockerfile to find upstream version (e.g. quay.io/keycloak/keycloak)"
      upstream_name_short:
        required: true
        type: string
        description: "Short name for tag suffix (e.g. keycloak)"
      dockerfile_path:
        required: false
        type: string
        default: "Dockerfile"
        description: "Path to the Dockerfile"
      context:
        required: false
        type: string
        default: "."
        description: "Build context"
      fetch_submodules:
        required: false
        type: string
        default: "false"
        description: "Whether to fetch submodules (true/false/recursive)"
      build_args:
        required: false
        type: string
        default: ""
        description: "List of build-time variables"

jobs:
  build-and-push:
    runs-on: stackdrift
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.fetch_submodules }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Docker CLI
        run: |
          set -e
          if ! command -v docker &> /dev/null; then
            apt-get update
            apt-get install -y ca-certificates curl
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
            chmod a+r /etc/apt/keyrings/docker.asc
            echo \
              "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian \
              $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
              tee /etc/apt/sources.list.d/docker.list > /dev/null
            apt-get update
            apt-get install -y docker-ce-cli
          else
            echo "Docker CLI is already installed."
          fi

      - name: Extract Upstream Version
        id: upstream
        run: |
          # Search string from inputs
          UPSTREAM_IMAGE="${{ inputs.upstream_image_search }}"
          UPSTREAM_NAME="${{ inputs.upstream_name_short }}"
          DOCKERFILE="${{ inputs.dockerfile_path }}"
          
          # Find the FROM line
          LINE=$(grep "FROM ${UPSTREAM_IMAGE}" "$DOCKERFILE" | head -n 1)
          
          if [ -z "$LINE" ]; then
            echo "::error::Could not find upstream image '$UPSTREAM_IMAGE' in $DOCKERFILE"
            exit 1
          fi

          # Extract the full image:tag string
          FULL_IMAGE=$(echo "$LINE" | awk '{print $2}')
          
          # Extract the version (everything after the last colon)
          VERSION=$(echo "$FULL_IMAGE" | awk -F: '{print $NF}')
          
          echo "UPSTREAM_NAME=$UPSTREAM_NAME" >> $GITHUB_OUTPUT
          echo "UPSTREAM_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Found upstream: $UPSTREAM_NAME version $VERSION"

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image_name }}
          tags: |
            # Tag with semver + upstream suffix (e.g. 1.0.0-keycloak26.3)
            type=semver,pattern={{version}},suffix=-${{ steps.upstream.outputs.UPSTREAM_NAME }}${{ steps.upstream.outputs.UPSTREAM_VERSION }}
            # Tag 'edge' for main branch + upstream suffix (e.g. edge-keycloak26.3)
            type=edge,suffix=-${{ steps.upstream.outputs.UPSTREAM_NAME }}${{ steps.upstream.outputs.UPSTREAM_VERSION }}
            # Simple SHA tag for every commit
            type=sha
            # PR tags (e.g. pr-123)
            type=ref,event=pr

      - name: Login to Codeberg Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: codeberg.org
          username: stackdrift
          password: ${{ secrets.registry_password }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile_path }}
          build-args: ${{ inputs.build_args }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
